name: Build & Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

env:
  VERSION: 1.0.${{ github.run_number }}

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Stamp version into app
        shell: pwsh
        run: |
          "__version__ = `"$env:VERSION`"" | Set-Content -Path app/version.py -Encoding utf8

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build single-file exe
        run: pyinstaller TwitchDVR-to-YouTube.spec --noconfirm

      - name: Verify exe was produced
        shell: pwsh
        run: |
          if (-not (Test-Path "dist/TwitchDVR-to-YouTube.exe")) {
            Write-Error "dist/TwitchDVR-to-YouTube.exe not found"
            exit 1
          }
          Get-Item dist/TwitchDVR-to-YouTube.exe | Format-List Name, Length

      - uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/TwitchDVR-to-YouTube.exe
          if-no-files-found: error

  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            arch: arm64
            experimental: false
          - runner: macos-15-intel
            arch: intel
            experimental: true
    runs-on: ${{ matrix.runner }}
    continue-on-error: ${{ matrix.experimental }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Stamp version into app
        run: printf '__version__ = "%s"\n' "$VERSION" > app/version.py

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build .app bundle
        run: pyinstaller TwitchDVR-to-YouTube.spec --noconfirm

      - name: Ad-hoc codesign
        run: codesign --force --deep -s - dist/TwitchDVR-to-YouTube.app

      - name: Create dmg
        run: |
          mkdir dmg-staging
          cp -R dist/TwitchDVR-to-YouTube.app dmg-staging/
          ln -s /Applications dmg-staging/Applications
          hdiutil create -volname "TwitchDVR-to-YouTube" \
            -srcfolder dmg-staging -ov -format UDZO \
            "TwitchDVR-to-YouTube-macos-${{ matrix.arch }}.dmg"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-dmg-${{ matrix.arch }}
          path: TwitchDVR-to-YouTube-macos-*.dmg
          if-no-files-found: error

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: TwitchDVR-to-YouTube v${{ env.VERSION }}
          generate_release_notes: true
          files: artifacts/*
