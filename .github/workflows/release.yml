name: Build & Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Stamp version into app
        shell: pwsh
        run: |
          $v = (Get-Content VERSION -Raw).Trim()
          "VERSION=$v" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "__version__ = `"$v`"" | Set-Content -Path app/version.py -Encoding utf8

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build single-file exe
        run: pyinstaller TwitchDVR-to-YouTube.spec --noconfirm

      - name: Verify exe was produced
        shell: pwsh
        run: |
          if (-not (Test-Path "dist/TwitchDVR-to-YouTube.exe")) {
            Write-Error "dist/TwitchDVR-to-YouTube.exe not found"
            exit 1
          }
          Get-Item dist/TwitchDVR-to-YouTube.exe | Format-List Name, Length

      - uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/TwitchDVR-to-YouTube.exe
          if-no-files-found: error

  build-macos:
    runs-on: macos-latest   # Apple Silicon only; Intel builds were dropped
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Stamp version into app
        run: |
          VERSION=$(tr -d ' \n' < VERSION)
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          printf '__version__ = "%s"\n' "$VERSION" > app/version.py

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build .app bundle
        run: pyinstaller TwitchDVR-to-YouTube.spec --noconfirm

      - name: Ad-hoc codesign
        run: codesign --force --deep -s - dist/TwitchDVR-to-YouTube.app

      - name: Create dmg
        run: |
          mkdir dmg-staging
          cp -R dist/TwitchDVR-to-YouTube.app dmg-staging/
          ln -s /Applications dmg-staging/Applications
          hdiutil create -volname "TwitchDVR-to-YouTube" \
            -srcfolder dmg-staging -ov -format UDZO \
            "TwitchDVR-to-YouTube-macos-arm64.dmg"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-dmg-arm64
          path: TwitchDVR-to-YouTube-macos-*.dmg
          if-no-files-found: error

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Read version and extract changelog notes
        run: |
          VERSION=$(tr -d ' \n' < VERSION)
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          awk -v ver="$VERSION" \
            '$0 ~ "^## "ver{flag=1; next} /^## /{if (flag) exit} flag' \
            CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "_No changelog entry for $VERSION — see CHANGELOG.md._" > release-notes.md
          fi
          echo "--- release notes ---"
          cat release-notes.md
          ls -la artifacts

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: TwitchDVR-to-YouTube v${{ env.VERSION }}
          body_path: release-notes.md
          files: artifacts/*
