name: Deploy to server

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: Docker
    env:
      SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
      SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
      SSHPASS: ${{ secrets.DEPLOY_SSH_PASSWORD }}
      SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
      DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
    steps:
      - name: Check deploy configuration
        id: check
        run: |
          if [ -z "$SSH_HOST" ] || [ -z "$SSH_USER" ] || [ -z "$SSHPASS" ] || [ -z "$DEPLOY_PATH" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Deploy secrets/variables not configured - skipping deploy."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.check.outputs.configured == 'true'

      - name: Install sshpass and rsync
        if: steps.check.outputs.configured == 'true'
        run: sudo apt-get update -q && sudo apt-get install -y -q sshpass rsync

      - name: Sync files to server
        if: steps.check.outputs.configured == 'true'
        run: |
          PORT="${SSH_PORT:-22}"
          sshpass -e rsync -az --delete \
            -e "ssh -p $PORT -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null" \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '__pycache__' \
            --exclude 'dist' \
            --exclude 'build' \
            --exclude 'docker-compose.yml' \
            --exclude 'config' \
            --exclude 'client_secret*.json' \
            ./ "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/"

      - name: Rebuild and restart the container
        if: steps.check.outputs.configured == 'true'
        run: |
          PORT="${SSH_PORT:-22}"
          sshpass -e ssh -p "$PORT" -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            "$SSH_USER@$SSH_HOST" \
            "cd '$DEPLOY_PATH' \
             && if [ ! -f docker-compose.yml ]; then cp docker-compose.yml.example docker-compose.yml; echo 'NOTE: created docker-compose.yml from the example - edit the volume paths!'; fi \
             && docker compose down \
             && docker compose build \
             && docker compose up -d"
